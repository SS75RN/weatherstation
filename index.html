<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Environmental Station</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: 'Inter', sans-serif;
    transition: background 1s ease;
}

/* atmospheric layer */
.particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: drift 40s linear infinite;
    opacity: 0.25;
}

@keyframes drift {
    from { transform: translateY(0); }
    to { transform: translateY(-200px); }
}

/* smoother cards */
.glass-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 1.5rem;
    transition: all 0.3s ease;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
}

.glass-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 40px rgba(59,130,246,0.2);
    border-color: rgba(59, 130, 246, 0.4);
}
</style>
</head>

<body class="text-slate-100 min-h-screen flex flex-col justify-between">

<div class="particles"></div>

<!-- HEADER -->
<header class="p-6 max-w-7xl mx-auto w-full flex justify-between items-center border-b border-slate-800">
    <div class="flex items-center gap-3">
        <i class="fa-solid fa-cloud-sun-rain text-3xl text-blue-400"></i>
        <div>
            <h1 class="text-2xl font-bold">Live Environmental Station</h1>
            <p class="text-xs text-slate-400">KS3 Geography Investigation System</p>
        </div>
    </div>

    <div id="status-tag" class="text-xs bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-full flex items-center gap-2 border border-emerald-500/20">
        <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
        Live Sync
    </div>
</header>

<!-- MAIN -->
<main class="max-w-7xl mx-auto w-full p-6 grid grid-cols-1 md:grid-cols-3 gap-6 flex-grow">

    <!-- TEMP -->
    <div class="glass-card p-6">
        <p class="text-sm uppercase text-slate-400">Temperature</p>
        <h2 id="temp-val" class="text-5xl font-extrabold mt-2">--°C</h2>
        <p id="temp-time" class="text-xs text-slate-400 mt-4">--</p>
    </div>

    <!-- HUM -->
    <div class="glass-card p-6">
        <p class="text-sm uppercase text-slate-400">Humidity</p>
        <h2 id="humid-val" class="text-5xl font-extrabold mt-2">--%</h2>
        <p id="humid-time" class="text-xs text-slate-400 mt-4">--</p>
    </div>

    <!-- PRESS -->
    <div class="glass-card p-6">
        <p class="text-sm uppercase text-slate-400">Pressure</p>
        <h2 id="press-val" class="text-5xl font-extrabold mt-2">-- hPa</h2>
        <p id="press-time" class="text-xs text-slate-400 mt-4">--</p>
    </div>

    <!-- INTERPRETATION -->
    <div class="glass-card p-6 md:col-span-3">
        <h3 class="text-lg font-semibold mb-2">🧠 Geography Interpretation</h3>
        <p id="insight" class="text-slate-300"></p>
    </div>

    <!-- QUESTIONS -->
    <div class="glass-card p-6 md:col-span-3">
        <h3 class="text-lg font-semibold mb-2">🧭 KS3 Enquiry Questions</h3>
        <ul id="questions" class="list-disc ml-6 text-slate-300 space-y-1"></ul>
    </div>

    <!-- CHART -->
    <div class="glass-card p-6 md:col-span-3">
        <h3 class="text-lg font-semibold mb-4">📊 24h Trends</h3>
        <canvas id="weatherChart"></canvas>
    </div>

</main>

<script>

const CHANNEL_ID = '2983326';
const LIVE_URL = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?results=1`;
const HIST_URL = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?results=24`;

let chart;

// 🌈 dynamic background
function updateBackground(temp) {
    if (temp < 5) {
        document.body.style.background = "linear-gradient(135deg,#0f172a,#1e3a8a)";
    } else if (temp < 15) {
        document.body.style.background = "linear-gradient(135deg,#0f172a,#1e293b)";
    } else {
        document.body.style.background = "linear-gradient(135deg,#3b1d0f,#1e293b)";
    }
}

// 🎨 colour logic
function tempColor(t) {
    if (t < 5) return "#60a5fa";
    if (t < 15) return "#34d399";
    return "#f97316";
}

// 🧠 interpretation
function updateInsight(temp, pressure, humidity) {
    let msg = "";

    if (pressure < 1005) {
        msg = "🌧 Low pressure suggests unsettled weather and possible rain.";
    } else if (pressure > 1020) {
        msg = "☀ High pressure suggests stable, dry conditions.";
    } else {
        msg = "🌤 Pressure is moderate — changeable conditions likely.";
    }

    if (humidity > 80) msg += " High humidity increases chance of cloud or rain.";

    document.getElementById("insight").innerText = msg;
}

// 🧭 enquiry questions (AUTO-GENERATED)
function generateQuestions(temp, pressure, humidity) {
    let q = [];

    if (temp > 20) q.push("Why is the temperature relatively high today?");
    if (temp < 10) q.push("What factors might be causing low temperatures?");

    if (pressure < 1005) q.push("How does low pressure influence rainfall patterns?");
    if (pressure > 1020) q.push("Why does high pressure often lead to clear skies?");

    if (humidity > 80) q.push("How does high humidity affect cloud formation?");

    q.push("How do temperature, pressure and humidity interact?");
    q.push("Is today's weather typical for a UK climate?");

    const ul = document.getElementById("questions");
    ul.innerHTML = "";
    q.forEach(x => {
        let li = document.createElement("li");
        li.innerText = x;
        ul.appendChild(li);
    });
}

// 📊 chart
function buildChart(labels, t, h) {

    const ctx = document.getElementById("weatherChart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels,
            datasets: [
                {
                    label: "Temp",
                    data: t,
                    borderColor: "#f97316",
                    tension: 0.4,
                    pointRadius: 0
                },
                {
                    label: "Humidity",
                    data: h,
                    borderColor: "#3b82f6",
                    tension: 0.4,
                    pointRadius: 0
                }
            ]
        },
        options: {
            responsive: true,
            plugins: { legend: { labels: { color: "#94a3b8" } } },
            scales: {
                x: { ticks: { color: "#64748b" } },
                y: { ticks: { color: "#64748b" } }
            }
        }
    });
}

// 🔌 main loop
async function update() {

    const live = await fetch(LIVE_URL).then(r => r.json());
    const latest = live.feeds[0];

    const temp = parseFloat(latest.field1);
    const hum = parseFloat(latest.field2);
    const press = parseFloat(latest.field3);

    // cards
    document.getElementById("temp-val").innerText = temp + "°C";
    document.getElementById("humid-val").innerText = hum + "%";
    document.getElementById("press-val").innerText = press + " hPa";

    document.getElementById("temp-val").style.color = tempColor(temp);

    const time = new Date(latest.created_at).toLocaleTimeString();
    document.getElementById("temp-time").innerText = time;
    document.getElementById("humid-time").innerText = time;
    document.getElementById("press-time").innerText = time;

    updateBackground(temp);
    updateInsight(temp, press, hum);
    generateQuestions(temp, press, hum);

    // history
    const hist = await fetch(HIST_URL).then(r => r.json());

    let labels = [];
    let t = [];
    let h = [];

    hist.feeds.forEach(f => {
        labels.push(new Date(f.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
        t.push(parseFloat(f.field1));
        h.push(parseFloat(f.field2));
    });

    buildChart(labels, t, h);
}

update();
setInterval(update, 30000);

</script>

</body>
</html>
