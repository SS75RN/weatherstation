<!DOCTYPE html>
<html>
<head>
<title>Live Environmental Station</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#0f172a; color:white; }
header { padding:20px; background:#1e293b; text-align:center; }

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:20px;
}

.card {
  background:#111827;
  padding:15px;
  border-radius:10px;
}

canvas { background:white; border-radius:10px; margin:20px; }
.small { color:#94a3b8; }
</style>
</head>

<body>

<header>
<h1>🌍 Live Environmental Station (KS3 Geography)</h1>
<p class="small">Real-time data from school Enviro+ sensor</p>
</header>

<div class="grid">
  <div class="card">🌡 Temp<br><h2 id="temp">--</h2></div>
  <div class="card">💧 Humidity<br><h2 id="hum">--</h2></div>
  <div class="card">🌬 Pressure<br><h2 id="press">--</h2></div>
  <div class="card">🌫 PM2.5<br><h2 id="pm">--</h2></div>
</div>

<canvas id="tempChart"></canvas>
<canvas id="pressChart"></canvas>
<canvas id="pmChart"></canvas>

<script>

const API = "https://ss75rn.github.io/weatherstation/data.json";

// history arrays (builds over time)
let tempData = [];
let pressData = [];
let pmData = [];
let labels = [];

async function update() {

  let res = await fetch(API + "?t=" + Date.now());
  let d = await res.json();

  // live values
  document.getElementById("temp").innerText = d.temp + " °C";
  document.getElementById("hum").innerText = d.humidity + " %";
  document.getElementById("press").innerText = d.pressure + " hPa";
  document.getElementById("pm").innerText = d.pm25 + " µg/m³";

  // store history
  let time = new Date().toLocaleTimeString();

  labels.push(time);
  tempData.push(d.temp);
  pressData.push(d.pressure);
  pmData.push(d.pm25);

  if(labels.length > 20){
    labels.shift();
    tempData.shift();
    pressData.shift();
    pmData.shift();
  }

  tempChart.update();
  pressChart.update();
  pmChart.update();
}

// CHARTS
const tempChart = new Chart(document.getElementById("tempChart"), {
  type:"line",
  data:{
    labels:labels,
    datasets:[{label:"Temperature", data:tempData}]
  }
});

const pressChart = new Chart(document.getElementById("pressChart"), {
  type:"line",
  data:{
    labels:labels,
    datasets:[{label:"Pressure", data:pressData}]
  }
});

const pmChart = new Chart(document.getElementById("pmChart"), {
  type:"line",
  data:{
    labels:labels,
    datasets:[{label:"PM2.5", data:pmData}]
  }
});

setInterval(update, 5000);
update();

</script>

</body>
</html>
